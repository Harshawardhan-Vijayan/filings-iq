services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: filings
      POSTGRES_PASSWORD: filings
      POSTGRES_DB: filings_iq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filings -d filings_iq"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://filings:filings@db:5432/filings_iq
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SEC_USER_AGENT: ${SEC_USER_AGENT}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
